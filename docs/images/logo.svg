<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 80">
  <defs>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0096c7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Three nested brackets representing context layers -->
  <g transform="translate(10, 12)">
    <!-- Outer bracket -->
    <path d="M 8 0 L 0 28 L 8 56" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
    <path d="M 40 0 L 48 28 L 40 56" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.3"/>
    <!-- Middle bracket -->
    <path d="M 14 8 L 8 28 L 14 48" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <path d="M 34 8 L 40 28 L 34 48" fill="none" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
    <!-- Inner dot (the context) -->
    <circle cx="24" cy="28" r="5" fill="url(#accent)"/>
  </g>

  <!-- Wordmark -->
  <text x="70" y="52" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="38" font-weight="600" fill="#1a1a2e" letter-spacing="-0.5">context<tspan fill="url(#accent)">ium</tspan></text>
</svg>
