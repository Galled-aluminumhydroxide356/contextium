<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00b4d8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0096c7;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="0" y2="640" stroke="white" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="640" stroke="white" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="640" stroke="white" stroke-width="1"/>
    <line x1="240" y1="0" x2="240" y2="640" stroke="white" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="640" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="640" stroke="white" stroke-width="1"/>
    <line x1="480" y1="0" x2="480" y2="640" stroke="white" stroke-width="1"/>
    <line x1="560" y1="0" x2="560" y2="640" stroke="white" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="640" stroke="white" stroke-width="1"/>
    <line x1="720" y1="0" x2="720" y2="640" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="640" stroke="white" stroke-width="1"/>
    <line x1="880" y1="0" x2="880" y2="640" stroke="white" stroke-width="1"/>
    <line x1="960" y1="0" x2="960" y2="640" stroke="white" stroke-width="1"/>
    <line x1="1040" y1="0" x2="1040" y2="640" stroke="white" stroke-width="1"/>
    <line x1="1120" y1="0" x2="1120" y2="640" stroke="white" stroke-width="1"/>
    <line x1="1200" y1="0" x2="1200" y2="640" stroke="white" stroke-width="1"/>
    <line x1="1280" y1="0" x2="1280" y2="640" stroke="white" stroke-width="1"/>
    <line x1="0" y1="80" x2="1280" y2="80" stroke="white" stroke-width="1"/>
    <line x1="0" y1="160" x2="1280" y2="160" stroke="white" stroke-width="1"/>
    <line x1="0" y1="240" x2="1280" y2="240" stroke="white" stroke-width="1"/>
    <line x1="0" y1="320" x2="1280" y2="320" stroke="white" stroke-width="1"/>
    <line x1="0" y1="400" x2="1280" y2="400" stroke="white" stroke-width="1"/>
    <line x1="0" y1="480" x2="1280" y2="480" stroke="white" stroke-width="1"/>
    <line x1="0" y1="560" x2="1280" y2="560" stroke="white" stroke-width="1"/>
  </g>

  <!-- Stacked Layers Mark -->
  <g transform="translate(510, 150)">
    <!-- Bottom layer -->
    <rect x="0" y="68" width="90" height="22" rx="5" fill="white" opacity="0.15"/>
    <!-- Middle layer -->
    <rect x="10" y="38" width="70" height="22" rx="5" fill="white" opacity="0.3"/>
    <!-- Top layer (teal) -->
    <rect x="20" y="8" width="50" height="22" rx="5" fill="url(#teal)"/>
  </g>

  <!-- Wordmark -->
  <text x="618" y="230" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="62" font-weight="700" fill="white" letter-spacing="-1" text-anchor="start">context<tspan fill="url(#teal)">ium</tspan></text>

  <!-- Tagline -->
  <text x="640" y="320" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="36" font-weight="600" fill="white" text-anchor="middle">Give your AI an operating system.</text>

  <!-- Subtitle -->
  <text x="640" y="380" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="20" fill="white" opacity="0.5" text-anchor="middle">Open-source framework for persistent AI context that compounds session over session.</text>

  <!-- Open Source badge -->
  <rect x="530" y="430" width="220" height="38" rx="19" fill="white" opacity="0.08"/>
  <text x="640" y="455" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="600" fill="#00b4d8" text-anchor="middle">100% Open Source  ·  Apache 2.0</text>

  <!-- Bottom accent line -->
  <rect x="560" y="510" width="160" height="3" rx="1.5" fill="url(#teal)" opacity="0.4"/>
</svg>
